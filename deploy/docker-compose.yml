version: "3.8"

services:
  # ──────────── PostgreSQL ────────────
  postgres:
    image: postgres:16-alpine
    container_name: af_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-auto_finance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app}"]
      interval: 5s
      retries: 5

  # ──────────── MinIO (S3 兼容存储) ────────────
  minio:
    image: minio/minio:latest
    container_name: af_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 3

  # ──────────── 后端 API ────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${BACKEND_PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${BACKEND_PIP_TRUSTED_HOST:-}
    container_name: af_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-app}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-auto_finance}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: https://${DOMAIN},http://${DOMAIN}
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-auto-finance}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      CHE300_ACCESS_KEY: ${CHE300_ACCESS_KEY}
      CHE300_ACCESS_SECRET: ${CHE300_ACCESS_SECRET}
      CHE300_API_BASE: ${CHE300_API_BASE:-https://cloud-api.che300.com}
      DEFAULT_CITY_CODE: ${DEFAULT_CITY_CODE:-320100}
      DEFAULT_CITY_NAME: ${DEFAULT_CITY_NAME:-南京}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEFAULT_REGISTRATION_TENANT_CODE: ${DEFAULT_REGISTRATION_TENANT_CODE:-default}
      DEFAULT_REGISTRATION_TENANT_NAME: ${DEFAULT_REGISTRATION_TENANT_NAME:-默认租户}
      LOG_FORMAT: json
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      retries: 5

  # ──────────── 前端 ────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: https://${DOMAIN}
    container_name: af_frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ──────────── Nginx 反向代理 + HTTPS ────────────
  nginx:
    image: nginx:alpine
    container_name: af_nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # ──────────── Let's Encrypt 证书自动续期 ────────────
  certbot:
    image: certbot/certbot
    container_name: af_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet --webroot -w /var/www/certbot; done'"

volumes:
  postgres_data:
  minio_data:
  certbot_www:
